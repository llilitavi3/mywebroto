<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoyalBet88 | Secure Login</title>
  <!-- נתיב יחסי כפול ומדויק שיוצא שתי תיקיות למעלה ומבטיח טעינת ה-CSS -->
  <link rel="stylesheet" href="../../css/global-theme.css">
  <style>
    /* שכבת גיבוי מקומית חזקה למקרה של השהיית טעינת CSS */
    .login-wrapper {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background: radial-gradient(circle, rgba(188, 21, 95, 0.15) 0%, transparent 80%);
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(145deg, rgba(34, 5, 22, 0.9) 0%, rgba(13, 2, 8, 0.95) 100%) !important;
      border: 1px solid rgba(243, 207, 101, 0.25) !important;
      border-radius: 16px !important;
      padding: 32px 24px !important;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6) !important;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #auth-form { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .form-group { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    .form-input {
      background: #111111 !important;
      border: 1px solid rgba(243, 207, 101, 0.15) !important;
      color: var(--text-main) !important;
      padding: 12px 14px !important;
      font-size: 14px !important;
      border-radius: 8px !important;
      width: 100% !important;
    }
    .hidden-element { display: none !important; }
  </style>
</head>
<body class="rtl">

  <!-- מרכז עמוד התחברות והרשמה -->
  <div class="login-wrapper">
    <div class="login-box">
      <h2 id="box-title" class="lang-text" data-key="title_login">התחברות למערכת</h2>
      <p id="box-desc" class="lang-text" data-key="desc_login">הזן את פרטי החשבון המלכותי שלך כדי להתחיל לשחק</p>

      <form id="auth-form" onsubmit="handleAuthSubmit(event)">
        <!-- שדה שם משתמש -->
        <div class="form-group">
          <label for="username-input" class="lang-text" data-key="label_user">שם משתמש</label>
          <input type="text" id="username-input" class="form-input" required autocomplete="username" placeholder="הזן שם משתמש">
        </div>

        <!-- שדה אימייל (מוסתר במצב כניסה) -->
        <div class="form-group hidden-element" id="email-group">
          <label for="email-input" class="lang-text" data-key="label_email">כתובת אימייל</label>
          <input type="email" id="email-input" class="form-input" autocomplete="email" placeholder="name@example.com">
        </div>

          <div class="form-group auth-password-group">
          <label for="password-input" class="lang-text" data-key="label_pass">סיסמה</label>
          <input type="password" id="password-input" class="form-input" required autocomplete="current-password" placeholder="הזן סיסמה">
        </div>

        <!-- כפתור הגשה ראשי ללא אינליין סטייל -->
        <button type="submit" id="submit-btn" class="btn-login lang-text auth-submit-btn" data-key="btn_login_submit">התחבר עכשיו</button>
      </form>

      <!-- קישור החלפה בין התחברות להרשמה ללא אינליין סטייל -->
      <div class="auth-switch-container">
        <span id="switch-text" class="lang-text auth-switch-text" data-key="switch_to_reg">אין לך חשבון עדיין?</span>
        <a href="#" id="switch-link" class="lang-text auth-switch-link" data-key="link_register" onclick="toggleAuthMode(event)">להרשמה מהירה</a>
      </div>
    </div>
  </div>

  <script>
    let currentAuthMode = "login";

    function toggleAuthMode(event) {
      event.preventDefault();
      const emailGroup = document.getElementById('email-group');
      const emailInput = document.getElementById('email-input');
      
      if (!emailGroup) return;

      if (currentAuthMode === "login") {
        currentAuthMode = "register";
        emailGroup.classList.remove('hidden-element');
        if (emailInput) emailInput.setAttribute('required', 'true');
      } else {
        currentAuthMode = "login";
        emailGroup.classList.add('hidden-element');
        if (emailInput) emailInput.removeAttribute('required');
      }
      
      const currentLang = localStorage.getItem('royal_lang') || 'he';
      updateFormTexts(currentLang);
    }

    function updateFormTexts(lang) {
      const boxTitle = document.getElementById('box-title');
      const boxDesc = document.getElementById('box-desc');
      const submitBtn = document.getElementById('submit-btn');
      const switchText = document.getElementById('switch-text');
      const switchLink = document.getElementById('switch-link');

      if (!translations[lang]) return;

      if (currentAuthMode === "login") {
        if (boxTitle) boxTitle.innerText = translations[lang].title_login;
        if (boxDesc) boxDesc.innerText = translations[lang].desc_login;
        if (submitBtn) submitBtn.innerText = translations[lang].btn_login_submit;
        if (switchText) {
          switchText.innerText = translations[lang].switch_to_reg;
          switchText.style.color = "var(--text-muted)";
        }
        if (switchLink) switchLink.innerText = translations[lang].link_register;
      } else {
        if (boxTitle) boxTitle.innerText = translations[lang].title_register;
        if (boxDesc) boxDesc.innerText = translations[lang].desc_register;
        if (submitBtn) submitBtn.innerText = translations[lang].btn_register_submit;
        if (switchText) {
          switchText.innerText = translations[lang].switch_to_login;
          switchText.style.color = "var(--gold-accent)";
        }
        if (switchLink) switchLink.innerText = translations[lang].link_login;
      }
    }

    async function handleAuthSubmit(event) {
      event.preventDefault();
      const username = document.getElementById('username-input').value;
      const password = document.getElementById('password-input').value;
      const email = document.getElementById('email-input').value;
      
      const BASE_URL = 'https://royalbet88.live';
      const url = currentAuthMode === "login" ? BASE_URL : `${BASE_URL}/register`;
      
      const bodyData = currentAuthMode === "login" 
        ? { identifier: username, password: password }
        : { username: username, email: email, password: password };

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData)
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error?.message || 'Authentication failed');

        localStorage.setItem('royal_token', data.jwt);
        localStorage.setItem('royal_user', JSON.stringify(data.user));

        alert(currentAuthMode === "login" ? "Welcome back! Redirecting..." : "Registration successful! Welcome.");
        window.location.href = "/";
      } catch (error) {
        alert(`Error: ${error.message}`);
      }
    }
  </script>

  <!-- חיבור יחסי כפול ומדויק לקובץ ה-JS הגלובלי -->
  <script src="../../js/global-app.js"></script>
</body>
</html>
